version: "3.9"

services:

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    depends_on:
      - orchestrator
      - ingestion-service

  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    env_file:
      - ./orchestrator/.env
    depends_on:
      - llm-service
      - retrieval-service
      - kg-service

  llm-service:
    build: ./llm-service
    ports:
      - "8001:8001"
    env_file:
      - ./llm-service/.env

  retrieval-service:
    build: ./retrieval-service
    ports:
      - "8002:8002"
    env_file:
      - ./retrieval-service/.env
    volumes:
      - ./retrieval-service/app/faiss_index:/app/app/faiss_index

  kg-service:
    build: ./kg-service
    ports:
      - "8003:8003"
    env_file:
      - ./kg-service/.env

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8004:8004"
    env_file:
      - ./ingestion-service/.env
    volumes:
      - ./Datasets:/app/Datasets